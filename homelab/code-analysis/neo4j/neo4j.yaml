services:
  neo4j:
    build: .
    container_name: neo4j
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"

      NEO4J_server_default__listen__address: "0.0.0.0"
      NEO4J_server_http_listen__address: ":7474"
      NEO4J_server_bolt_listen__address: ":7687"

      NEO4J_dbms_usage__report_enabled: "false"

    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins

    networks:
      - homelab-code-analysis-net
      - homelab-gateway-net
    ports:
      - "7687:7687"

    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=homelab-gateway-net"

      - "traefik.http.routers.neo4j.rule=Host(`neo4j.home.arpa`)"
      - "traefik.http.routers.neo4j.entrypoints=web"
#      - "traefik.http.routers.neo4j.middlewares=neo4j-redirect"
      - "traefik.http.routers.neo4j.service=neo4j"

      - "traefik.http.routers.neo4j-https.rule=Host(`neo4j.home.arpa`)"
      - "traefik.http.routers.neo4j-https.entrypoints=websecure"
      - "traefik.http.routers.neo4j-https.tls=true"
      - "traefik.http.routers.neo4j-https.tls.certresolver=stepca"
      - "traefik.http.routers.neo4j-https.service=neo4j"

#      - "traefik.http.middlewares.neo4j-redirect.redirectscheme.scheme=https"
      - "traefik.http.services.neo4j.loadbalancer.server.port=7474"

#    healthcheck:
#      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_PASSWORD}\" 'RETURN 1;' || exit 1"]
#      interval: 30s
#      timeout: 10s
#      retries: 5
#      start_period: 60s

volumes:
  neo4j_data:
    name: neo4j_data
  neo4j_logs:
    name: neo4j_logs
  neo4j_import:
    name: neo4j_import
  neo4j_plugins:
    name: neo4j_plugins
